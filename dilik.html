<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Декоративные рейки из МДФ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #8e735b;
            color: white;
            text-align: center;
            padding: 20px 0;
        }
        .content {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            margin: 20px;
        }
        .product {
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            margin: 10px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .product img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .price {
            font-size: 1.2em;
            color: #8e735b;
            margin-top: 10px;
        }
        footer {
            background-color: #8e735b;
            color: white;
            text-align: center;
            padding: 10px 0;
            margin-top: 40px;
        }
        .contact-info {
            margin-top: 20px;
            font-size: 1.1em;
        }
        .contact-info a {
            color: #8e735b;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Декоративные рейки из МДФ</h1>
